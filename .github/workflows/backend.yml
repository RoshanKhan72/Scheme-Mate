name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: scheme_mate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run migrations on fresh test database
        run: npm run migrate
        working-directory: backend
        env:
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/scheme_mate_test'

      - name: Run backend tests
        run: npm test
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_SECRET: 'test_jwt_secret_key_satisfying_length_32_chars_long'
          DATABASE_URL_TEST: 'postgresql://postgres:postgres@localhost:5432/scheme_mate_test'
