version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: schememate_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_secure_password
      POSTGRES_DB: schememate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    container_name: schememate_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=your_secure_password
      - DB_NAME=schememate
      - JWT_SECRET=scheme_mate_super_secret_key_change_me_in_production
    depends_on:
      - db

volumes:
  pgdata:
